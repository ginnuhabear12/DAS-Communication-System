<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edge Monitor Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
  <!-- Chart.js from CDN for the mockup -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <header class="topbar">
    <div>
      <h1>Edge Monitoring Device</h1>
      <div class="sub">DAS KPI Dashboard + Configuration (Mock)</div>
    </div>

    <div class="status">
      <div class="pill" id="pillConn">API: unknown</div>
      <div class="pill" id="pillAlarm">Alarm: none</div>
    </div>
  </header>

  <main class="grid">
    <!-- KPI Chart -->
    <section class="card wide">
      <div class="cardHeader">
        <h2>Live KPI Trend</h2>
        <div class="controls">
          <button class="btn" id="btnPause">Pause</button>
          <button class="btn" id="btnClear">Clear</button>
        </div>
      </div>

      <canvas id="kpiChart" height="110"></canvas>

      <div class="legendRow">
        <div class="metric">
          <div class="label">RSRP (dBm)</div>
          <div class="value" id="vRsrp">--</div>
        </div>
        <div class="metric">
          <div class="label">RSRQ (dB)</div>
          <div class="value" id="vRsrq">--</div>
        </div>
        <div class="metric">
          <div class="label">SINR (dB)</div>
          <div class="value" id="vSinr">--</div>
        </div>
        <div class="metric">
          <div class="label">RSSI (dBm)</div>
          <div class="value" id="vRssi">--</div>
        </div>
      </div>
    </section>

    <!-- Configuration (mock only) -->
    <section class="card">
      <h2>Configurable Settings (Mock)</h2>
      <p class="muted">
        Buttons/fields are placeholders. No settings are saved yet.
      </p>

      <div class="group">
        <h3>Network / IP</h3>
        <div class="row">
          <label>Mode</label>
          <select disabled>
            <option>DHCP</option>
            <option>Static</option>
          </select>
        </div>
        <div class="row">
          <label>Static IP</label>
          <input type="text" placeholder="e.g. 192.168.1.50" disabled />
        </div>
        <div class="row">
          <label>Gateway</label>
          <input type="text" placeholder="e.g. 192.168.1.1" disabled />
        </div>
        <div class="row">
          <label>Subnet</label>
          <input type="text" placeholder="e.g. 255.255.255.0" disabled />
        </div>
        <div class="row">
          <button class="btnPrimary" disabled>Apply IP Config</button>
          <button class="btn" disabled>Reboot Network</button>
        </div>
      </div>

      <div class="group">
        <h3>Monitoring</h3>
        <div class="row">
          <label>Sample Interval</label>
          <input type="text" placeholder="e.g. 60 seconds" disabled />
        </div>
        <div class="row">
          <label>Threshold: RSRP</label>
          <input type="text" placeholder="e.g. -105 dBm" disabled />
        </div>
        <div class="row">
          <label>Threshold: SINR</label>
          <input type="text" placeholder="e.g. 5 dB" disabled />
        </div>
        <div class="row">
          <button class="btnPrimary" disabled>Apply Monitoring</button>
        </div>
      </div>

      <div class="group">
        <h3>SNMP</h3>
        <div class="row">
          <label>Manager IP</label>
          <input type="text" placeholder="e.g. 10.0.0.10" disabled />
        </div>
        <div class="row">
          <label>Trap Port</label>
          <input type="text" placeholder="162" disabled />
        </div>
        <div class="row">
          <label>Community</label>
          <input type="text" placeholder="public" disabled />
        </div>
        <div class="row">
          <button class="btnPrimary" disabled>Apply SNMP</button>
          <button class="btn" disabled>Send Test Trap</button>
        </div>
      </div>

      <div class="group">
        <h3>Admin</h3>
        <div class="row">
          <label>Username</label>
          <input type="text" placeholder="admin" disabled />
        </div>
        <div class="row">
          <label>Password</label>
          <input type="password" placeholder="••••••••" disabled />
        </div>
        <div class="row">
          <button class="btnPrimary" disabled>Update Credentials</button>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>

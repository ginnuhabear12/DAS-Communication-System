<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DAS Monitoring | Login</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700&display=fallback">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans Pro', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo i {
      font-size: 2.5rem;
      color: #28a745;
    }
    .login-logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #212529;
      margin-top: 8px;
    }
    .login-logo p {
      font-size: 0.82rem;
      color: #6c757d;
      margin-top: 2px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #495057;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    input {
      width: 100%;
      padding: 10px 38px 10px 12px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #28a745; box-shadow: 0 0 0 3px rgba(40,167,69,0.15); }
    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #6c757d;
      font-size: 0.9rem;
      padding: 0;
    }
    .toggle-pw:hover { color: #212529; }
    .btn-login {
      width: 100%;
      padding: 11px;
      background: #28a745;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #218838; }
    .error-msg {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: #adb5bd;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-broadcast-tower"></i>
      <h1>DAS Monitoring</h1>
      <p>Sign in to continue</p>
    </div>

    {% if error %}
    <div class="error-msg">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" onclick="togglePw()" tabindex="-1">
            <i class="fas fa-eye" id="pw-icon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt mr-1"></i> Sign In
      </button>
    </form>

    <div class="footer-note">DAS Monitoring System © 2026</div>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('pw-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
